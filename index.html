<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- App Title -->
    <title>Peco-lens</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- iPhone PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Peco-lens" />

    <!-- iPhone Icon -->
    <link rel="apple-touch-icon" href="/icons/peco-192.png" />

    <!-- Theme Colors -->
    <meta name="theme-color" content="#0A84FF" />
    <meta name="background-color" content="#000000" />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ============================
         APP ROOT + LAYERS
         ============================ -->
    <div id="app">

        <!-- ============================
             LAYER 1 — LENS MENU
             ============================ -->
        <div class="card active" id="layer1">
            <h1>Lens</h1>

            <button class="menu-button" onclick="openLens()">
                Open AR Lens
            </button>

            <button class="menu-button" onclick="openTools()">
                Tools Menu
            </button>

            <button class="menu-button" onclick="openMaintenance()">
                Maintenance Menu
            </button>

            <button class="menu-button" onclick="openMessagingLayer()">
                Messaging
            </button>

            <button class="menu-button" onclick="openSettings()">
                Settings
            </button>
        </div>


        <!-- ============================
             LAYER 2 — TOOLS MENU
             ============================ -->
        <div class="card" id="layer2">
            <h1>Tools</h1>

            <button class="menu-button">Calibration</button>
            <button class="menu-button">Calendar</button>
            <button class="menu-button">Gallery</button>
            <button class="menu-button">PM List</button>
            <button class="menu-button">Training</button>

            <button class="menu-button" onclick="goToLayer(1)">
                ← Back
            </button>
        </div>


        <!-- ============================
             LAYER 3 — MAINTENANCE MENU
             ============================ -->
        <div class="card" id="layer3">
            <h1>Maintenance</h1>

            <button class="menu-button">Inspection Guides</button>
            <button class="menu-button">Failure Analysis</button>
            <button class="menu-button">Machine Hierarchy</button>

            <button class="menu-button" onclick="goToLayer(1)">
                ← Back
            </button>
        </div>


        <!-- ============================
             LAYER 4 — MESSAGING MENU
             ============================ -->
        <div class="card" id="layer4">
            <h1>Messaging</h1>

            <button class="menu-button" onclick="openMessages()">
                Open Messages
            </button>

            <button class="menu-button" onclick="goToLayer(1)">
                ← Back
            </button>
        </div>


        <!-- ============================
             LAYER 5 — SETTINGS MENU
             ============================ -->
        <div class="card" id="layer5">
            <h1>Settings</h1>

            <button class="menu-button">Profile</button>
            <button class="menu-button">Permissions</button>
            <button class="menu-button">Theme</button>
            <button class="menu-button">Logout</button>

            <button class="menu-button" onclick="goToLayer(1)">
                ← Back
            </button>
        </div>

    </div>

    <!-- Floating Buttons -->
    <div class="lens-button" onclick="openLens()">Lens</div>
    <div class="message-bubble" onclick="openMessages()">Chat</div>

    <!-- App Logic -->
    <script src="app.js"></script>

    <!-- Register Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("Peco-lens/service-worker.js")
                .then(() => console.log("Service Worker Registered"))
                .catch(err => console.log("Service Worker Error:", err));
        }
    </script>

</body>
</html>
